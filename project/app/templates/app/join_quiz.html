{% extends 'app/base.html' %}

{% block content %}
<div class="flex-center" style="min-height: 70vh;">
    <div class="glass-card" style="width: 100%; max-width: 450px; text-align: center;">
        <h2 class="text-gradient" style="font-size: 2rem; margin-bottom: 2rem;">Join Arena</h2>

        {% if error %}
        <div
            style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--error); padding: 1rem; margin-bottom: 1.5rem; border-radius: 8px; font-weight: 500;">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 2.5rem; text-align: left;">
                <label class="elegant-label" style="text-align: center; margin-bottom: 1rem; font-size: 1.1rem;">Access
                    Code</label>
                <input type="text" name="join_code" class="elegant-input"
                    style="font-size: 2.5rem; font-weight: 800; text-align: center; letter-spacing: 8px; text-transform: uppercase; padding: 1.5rem;"
                    required maxlength="6" autocomplete="off" placeholder="XXXXXX">
            </div>

            <button type="submit" class="elegant-btn"
                style="width: 100%; font-size: 1.1rem; padding: 1rem;">Connect</button>
        </form>
    </div>
</div>
{% endblock %}
