{% extends 'app/base.html' %}

{% block content %}
<div class="flex-center" style="min-height: 70vh;">
    <div class="glass-card" style="width: 100%; max-width: 420px; text-align: center;">
        <h2 class="text-gradient" style="font-size: 2rem; margin-bottom: 2rem;">Welcome Back</h2>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label class="elegant-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}" class="elegant-input" style="margin-bottom: 0;" required>
            </div>
            {% endfor %}

            <button type="submit" class="elegant-btn" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>

        <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
            Don't have an account? <a href="{% url 'register' %}"
                style="color: var(--accent); text-decoration: none; font-weight: 500;">Sign up here.</a>
        </p>
    </div>
</div>
{% endblock %}
