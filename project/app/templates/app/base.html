{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Arena - Premium Edition</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="navbar-brand text-gradient">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            BLITZ ARENA
        </a>

        <div class="nav-links">
            {% if user.is_authenticated %}
            <div class="flex-center" style="gap: 12px; margin-right: 1.5rem;">
                <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=8b5cf6&color=fff&bold=true"
                    alt="Avatar" class="avatar-img">
                <span style="font-weight: 600; font-size: 0.95rem;">{{ user.username }} | <span
                        style="color: var(--accent-secondary);">{{ user.total_points }} PTS</span></span>
            </div>
            {% if user.is_staff %}
            <a href="{% url 'admin_dashboard' %}">Admin</a>
            {% endif %}
            <a href="{% url 'join_quiz' %}">Join Quiz</a>
            <a href="{% url 'create_quiz' %}">Create Quiz</a>
            <a href="{% url 'logout' %}" style="color: var(--error);">Logout</a>
            {% else %}
            <a href="{% url 'login' %}">Sign In</a>
            <a href="{% url 'register' %}" class="elegant-btn" style="padding: 0.5rem 1.5rem;">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>
</body>

</html>
