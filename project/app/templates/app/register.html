{% extends 'app/base.html' %}

{% block content %}
<div class="flex-center" style="min-height: 70vh;">
    <div class="glass-card" style="width: 100%; max-width: 480px;">
        <h2 class="text-gradient" style="font-size: 2rem; margin-bottom: 2rem; text-align: center;">Create Account</h2>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom: 1.5rem;">
                <label class="elegant-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}" class="elegant-input" style="margin-bottom: 0;" required>
                {% if field.help_text %}
                <small
                    style="color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 0.4rem;">{{field.help_text|safe}}</small>
                {% endif %}
                {% for error in field.errors %}
                <small style="color: var(--error); display: block; margin-top: 0.4rem;">{{ error }}</small>
                {% endfor %}
            </div>
            {% endfor %}

            <button type="submit" class="elegant-btn" style="width: 100%; margin-top: 1rem;">Register Now</button>
        </form>

        <p style="margin-top: 2rem; color: var(--text-muted); text-align: center; font-size: 0.95rem;">
            Already have an account? <a href="{% url 'login' %}"
                style="color: var(--accent-secondary); text-decoration: none; font-weight: 500;">Log in here.</a>
        </p>
    </div>
</div>
{% endblock %}
